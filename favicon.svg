<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a7ab8"/>
      <stop offset="100%" stop-color="#2d5a8a"/>
    </linearGradient>
    <linearGradient id="page" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8eef5"/>
    </linearGradient>
    <linearGradient id="book" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6fa8dc"/>
      <stop offset="100%" stop-color="#3d7eaa"/>
    </linearGradient>
  </defs>

  <!-- 圆形背景 -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)"/>
  <circle cx="32" cy="32" r="30" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.25"/>

  <!-- 书本主体 -->
  <g transform="translate(32 32)">
    <!-- 书页（左） -->
    <path d="M-14 -16 L-2 -18 L-2 18 L-14 16 Z" fill="url(#page)"/>
    <!-- 书页（右） -->
    <path d="M14 -16 L2 -18 L2 18 L14 16 Z" fill="url(#page)"/>
    <!-- 书脊（中缝） -->
    <path d="M-2 -18 L-2 18 M2 -18 L2 18" stroke="#d0d8e2" stroke-width="1.2"/>
    <!-- 书本外壳（左外） -->
    <path d="M-16 -18 Q-16 -20 -14 -20 L-2 -17 L-2 19 L-14 17 Q-16 17 -16 15 Z" fill="url(#book)"/>
    <!-- 书本外壳（右外） -->
    <path d="M16 -18 Q16 -20 14 -20 L2 -17 L2 19 L14 17 Q16 17 16 15 Z" fill="url(#book)"/>

    <!-- 书页上的线条 -->
    <g stroke="#9fb4cc" stroke-width="1" stroke-linecap="round" opacity="0.7">
      <line x1="-11" y1="-8" x2="-5" y2="-8.5"/>
      <line x1="-12" y1="-2" x2="-5" y2="-2.5"/>
      <line x1="-11" y1="4" x2="-5" y2="3.5"/>
      <line x1="11" y1="-8" x2="5" y2="-8.5"/>
      <line x1="12" y1="-2" x2="5" y2="-2.5"/>
      <line x1="11" y1="4" x2="5" y2="3.5"/>
    </g>

    <!-- 对勾（绿色） -->
    <path d="M-4 -2 L1 4 L11 -7" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M-4 -2 L1 4 L11 -7" fill="none" stroke="#7ddc8c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
