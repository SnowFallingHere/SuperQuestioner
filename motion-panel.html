<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motion 可视化面板</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #0d1117;
  color: #c9d1d9;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh; padding: 20px;
}
.dashboard {
  max-width: 800px; width: 100%;
  display: grid; gap: 20px;
}

/* 标题 */
.title { text-align:center; font-size:20px; font-weight:600; color:#58a6ff; letter-spacing:2px; }
.title small { display:block; font-size:13px; color:#8b949e; font-weight:400; margin-top:4px; }

/* 卡片 */
.card {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 12px;
  padding: 20px 24px;
}

/* 第一行：陀螺仪 + 题型 */
.row-sensor { display:flex; gap:20px; }
.gauge-box { flex:1; text-align:center; }
.gauge-label { font-size:13px; color:#8b949e; margin-bottom:8px; }
.gauge-value {
  font-size:48px; font-weight:700; color:#58a6ff; line-height:1;
  transition: color .3s;
}
.gauge-value.forward { color:#f0883e; }
.gauge-value.backward { color:#a371f7; }
.gauge-unit { font-size:16px; color:#8b949e; }
.gauge-bar {
  width:100%; height:6px; background:#21262d; border-radius:3px; margin-top:12px; overflow:hidden;
}
.gauge-fill {
  height:100%; border-radius:3px; background:linear-gradient(90deg,#f0883e,#58a6ff,#a371f7);
  transition: width .3s ease;
}
.gauge-range { display:flex; justify-content:space-between; font-size:10px; color:#484f58; margin-top:3px; }

.type-box { text-align:center; min-width:120px; }
.type-badge {
  display:inline-block; padding:4px 14px; border-radius:20px;
  font-size:13px; font-weight:600; margin-top:6px;
}
.type-badge.choice { background:#1f6feb33; color:#58a6ff; border:1px solid #1f6feb55; }
.type-badge.true_false { background:#23863633; color:#3fb950; border:1px solid #23863655; }
.type-badge.calculation { background:#da363333; color:#f85149; border:1px solid #da363355; }
.type-badge.subjective { background:#a371f733; color:#bc8cff; border:1px solid #a371f755; }
.type-badge.unknown { background:#484f5833; color:#8b949e; border:1px solid #484f5855; }

/* 第二行：选项 + 确认 */
.row-options { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
.opt {
  width:52px; height:52px; border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  font-size:22px; font-weight:700;
  border:2px solid #30363d; background:#0d1117;
  transition: all .2s;
}
.opt.active { border-color:#58a6ff; background:#1f6feb22; color:#58a6ff; box-shadow:0 0 12px #1f6feb44; }
.opt.confirmed { border-color:#3fb950; background:#23863622; color:#3fb950; }
.opt.inactive { opacity:.35; }

/* 第三行：日志 */
.log-area {
  background:#0d1117; border:1px solid #21262d; border-radius:8px;
  padding:12px; font-size:13px; font-family:monospace;
  height:120px; overflow-y:auto;
}
.log-area::-webkit-scrollbar { width:4px; }
.log-area::-webkit-scrollbar-track { background:#0d1117; }
.log-area::-webkit-scrollbar-thumb { background:#30363d; border-radius:2px; }
.log-entry { color:#8b949e; padding:2px 0; border-bottom:1px solid #161b22; }
.log-entry .ts { color:#484f58; }
.log-entry .highlight { color:#f0c674; }

/* 状态行 */
.status-bar {
  display:flex; justify-content:center; gap:20px;
  font-size:12px; color:#484f58; border-top:1px solid #21262d;
  padding-top:12px; margin-top:4px;
}
.status-bar span em { color:#8b949e; font-style:normal; }
</style>
</head>
<body>
<div class="dashboard" id="app">
  <div class="title">
    🎯 Motion Panel
    <small>陀螺仪手势控制 · 实时可视化</small>
  </div>

  <!-- 传感器行 -->
  <div class="card">
    <div class="row-sensor">
      <div class="gauge-box">
        <div class="gauge-label">倾角 β</div>
        <div class="gauge-value" id="betaValue">--<span class="gauge-unit">°</span></div>
        <div class="gauge-bar"><div class="gauge-fill" id="betaFill" style="width:50%"></div></div>
        <div class="gauge-range"><span>前倾 83°</span><span>回正 88~98°</span><span>后仰 103°</span></div>
      </div>
      <div class="type-box">
        <div class="gauge-label">题型</div>
        <div class="type-badge" id="typeBadge">等待中</div>
      </div>
    </div>
  </div>

  <!-- 选项行 -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span class="gauge-label">选项光标</span>
      <span class="gauge-label" id="tiltState" style="color:#8b949e">状态: —</span>
    </div>
    <div class="row-options" id="optionsRow">
      <div class="opt" data-label="A">A</div>
      <div class="opt" data-label="B">B</div>
      <div class="opt" data-label="C">C</div>
      <div class="opt" data-label="D">D</div>
    </div>
    <div style="margin-top:12px;text-align:center">
      <span class="gauge-label">已确认:</span>
      <span id="confirmedDisplay" style="color:#3fb950;font-weight:600;font-size:18px;margin-left:8px">—</span>
    </div>
  </div>

  <!-- 日志行 -->
  <div class="card">
    <div class="gauge-label" style="margin-bottom:8px">事件日志</div>
    <div class="log-area" id="logArea"></div>
    <div class="status-bar">
      <span>连接: <em id="connStatus">检查中...</em></span>
      <span>更新: <em id="updateFreq">0ms</em></span>
    <span>回正: <em id="calResting">--</em>°</span>
    <span>步进: <em id="calStep">--</em>°</span>
    <span>死区: <em id="calMargin">--</em>°</span>
    <span>gamma: <em id="gammaVal">--</em>°</span>
    <span>左倾: <em id="calGammaL">--</em>°</span>
    <span>右倾: <em id="calGammaR">--</em>°</span>
    <span>下坠: <em id="calDrop">--</em></span>
    <span>体感: <em id="motionStatus">OFF</em></span>
    </div>
  </div>

  <!-- 摄像头手势 -->
  <div class="card">
    <div style="display:flex;gap:16px;align-items:center">
      <canvas id="camCanvas" width="160" height="120" style="border-radius:8px;border:1px solid #30363d;background:#0d1117;width:160px"></canvas>
      <div>
        <div class="gauge-label">手势识别</div>
        <div style="font-size:24px;font-weight:700;color:#a6e3a1" id="gestureDisplay">等待中</div>
        <div style="font-size:12px;color:#6c7086" id="gestureDetail">--</div>
      </div>
    </div>
    <div class="status-bar" style="margin-top:8px">
      <span>帧: <em id="frameStatus">--</em></span>
      <span>手指: <em id="fingerCount">--</em></span>
      <span>动作: <em id="actionStatus">--</em></span>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  var opts = { A:null, B:null, C:null, D:null };
  var logEl = document.getElementById('logArea');
  var maxLogs = 50;
  var logs = [];
  var lastState = null;
  var pollTimer = null;

  function update() {
    fetch('/state', { cache: 'no-cache' })
      .then(function(r) { return r.json(); })
      .then(function(raw) {
        lastState = raw;
        renderState(raw);
        document.getElementById('connStatus').textContent = '已连接';
      })
      .catch(function() {
        // 如果失败但之前有缓存数据则继续显示
        if (!lastState) document.getElementById('connStatus').textContent = '未连接';
      });
  }

  function renderState(raw) {
    if (!raw) return;

    // Beta
    var beta = raw.beta || 0;
    var betaEl = document.getElementById('betaValue');
    var tilt = raw.tiltState || 'neutral';
    betaEl.className = 'gauge-value' + (tilt !== 'neutral' ? ' ' + tilt : '');
    betaEl.childNodes[0].nodeValue = beta.toFixed(1);

    // 进度条
    var pct = Math.min(100, Math.max(0, (beta / 180) * 100));
    document.getElementById('betaFill').style.width = pct + '%';

    // 题型
    var type = raw.type || 'unknown';
    var badge = document.getElementById('typeBadge');
    var typeMap = {
      choice: '选择题', true_false: '判断题',
      single_choice: '单选', multiple_choice: '多选',
      calculation: '计算题', subjective: '主观题', unknown: '未知'
    };
    badge.textContent = typeMap[type] || type;
    badge.className = 'type-badge ' + (type === 'single_choice' ? 'choice' : type);

    // 倾斜状态
    var tiltLabel = { neutral: '回正中', forward: '前倾中 ↓', backward: '后仰中 ↑' };
    document.getElementById('tiltState').textContent = '状态: ' + (tiltLabel[tilt] || tilt);

    // 选项
    var cursor = raw.cursor || '-';
    var confirmed = raw.confirmed || '';
    var currentLabels = [];
    if (cursor && cursor !== '-') currentLabels.push(cursor);

    document.querySelectorAll('.opt').forEach(function(el) {
      var label = el.dataset.label;
      el.classList.remove('active', 'confirmed', 'inactive');
      if (currentLabels.indexOf(label) !== -1) el.classList.add('active');
      if (confirmed.indexOf(label) !== -1) el.classList.add('confirmed');
    });

    // 已确认
    document.getElementById('confirmedDisplay').textContent = confirmed || '—';

    // 校准信息
    if (raw.resting) {
      document.getElementById('calResting').textContent = raw.resting;
      document.getElementById('calStep').textContent = raw.stepDeg || '?';
      document.getElementById('calMargin').textContent = raw.margin || '?';
    }
    if (raw.gamma !== undefined) {
      document.getElementById('gammaVal').textContent = raw.gamma;
    }
    if (raw.gammaL) {
      document.getElementById('calGammaL').textContent = raw.gammaL;
      document.getElementById('calGammaR').textContent = raw.gammaR;
      document.getElementById('calDrop').textContent = raw.dropAccel + ' m/s²';
    }
    document.getElementById('motionStatus').textContent = raw.motionOn ? 'ON' : 'OFF';
  }

  // 每 200ms 轮询
  setInterval(update, 200);
  update();

  // 日志：从服务器拉取
  function renderLogs() {
    fetch('/logs', { cache: 'no-cache' })
      .then(function(r){return r.json()})
      .then(function(raw){
        if (!raw || !raw.length) return;
        var html = '';
        var slice = raw.slice(-30);
        for (var i = slice.length - 1; i >= 0; i--) {
          var e = slice[i];
          var ts = new Date(e.t).toLocaleTimeString();
          html += '<div class="log-entry"><span class="ts">[' + ts + ']</span> ' + escHtml(e.m) + '</div>';
        }
        logEl.innerHTML = html;
      })
      .catch(function(){});
  }
  function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  setInterval(renderLogs, 500);
  renderLogs();

  // 更新频率显示
  var lastTime = Date.now();
  setInterval(function() {
    document.getElementById('updateFreq').textContent = (Date.now() - lastTime) + 'ms';
    lastTime = Date.now();
  }, 500);
})();

// ===== 摄像头手势处理（直接使用本机摄像头）=====
(function(){
var video=document.createElement('video');
video.setAttribute('autoplay','');
video.style.display='none';
document.body.appendChild(video);
var canvas=document.getElementById('camCanvas');
var ctx=canvas.getContext('2d');
var fingerEl=document.getElementById('fingerCount');
var actionEl=document.getElementById('actionStatus');
var frameEl=document.getElementById('frameStatus');
var displayEl=document.getElementById('gestureDisplay');
var detailEl=document.getElementById('gestureDetail');

var hands=null, lastAction=0, ACTION_CD=800;
var palmHistory=[], WAVE_HISTORY=10;
var currentFingers=0;

// 启动本机摄像头
navigator.mediaDevices.getUserMedia({video:{width:320,height:240}})
  .then(function(s){
    video.srcObject=s;
    displayEl.textContent='摄像头就绪';
    loadMP();
  })
  .catch(function(e){
    displayEl.textContent='摄像头被拒绝: '+e.message;
    detailEl.textContent='请允许摄像头权限';
  });

function loadMP(){
  if(typeof Hands==='undefined'){
    var s=document.createElement('script');
    s.src='assets/lib/hands.js';
    s.onload=function(){console.log('[panel] hands.js loaded');initMP()};
    document.head.appendChild(s);
    return;
  }
  initMP();
}
function initMP(){
  window.Module=window.Module||{};
  Module.TOTAL_MEMORY=512*1024*1024;
  hands=new Hands({locateFile:function(f){
     if(f.indexOf('simd')>=0)f=f.replace('simd_','');
     if(f==='hand_landmark_full.tflite')f='hand_landmark_lite.tflite';
     return 'assets/wasm/'+f;
  }});
  // 轮询等 graph 就绪
  var t=setInterval(function(){
    try{
      hands.setOptions({maxNumHands:1,modelComplexity:0,minDetectionConfidence:.85,minTrackingConfidence:.7});
      hands.onResults(function(r){
        if(!r.multiHandLandmarks||!r.multiHandLandmarks.length){
          detailEl.textContent='无手势';return;
        }
        try{
          var lm=r.multiHandLandmarks[0];
          var fingers=0;
          var tips=[4,8,12,16,20];
          var d4=Math.sqrt((lm[4].x-lm[0].x)**2+(lm[4].y-lm[0].y)**2);
          var d3=Math.sqrt((lm[3].x-lm[0].x)**2+(lm[3].y-lm[0].y)**2);
          if(d4>d3*1.2)fingers++;
          for(var i=1;i<5;i++){var t2=lm[tips[i]],p=lm[tips[i]-2];if(t2.y<p.y-0.03)fingers++}
          palmHistory.push(lm[9].x);if(palmHistory.length>WAVE_HISTORY)palmHistory.shift();
          currentFingers=fingers;
          var wave=palmHistory.length>=WAVE_HISTORY&&(Math.max.apply(null,palmHistory)-Math.min.apply(null,palmHistory))>0.15;
          var fist=fingers===0;
          fingerEl.textContent=fingers;
          actionEl.textContent=fist?'拳':wave?'👋':fingers+'指';
          var now=Date.now();
          if(fingers>=1&&fingers<=4)displayEl.textContent=String.fromCharCode(64+fingers);
          else if(fist)displayEl.textContent='✊';
          else if(wave)displayEl.textContent='👋';
          else displayEl.textContent='--';
        }catch(e){detailEl.textContent='错误: '+e.message}
      });
       console.log('[panel] MediaPipe 就绪');
       clearInterval(t);
       loop();
     }catch(e){/* graph not ready yet */}
  },500);
}

function loop(){
  if(!video.videoWidth)return;
  ctx.drawImage(video,0,0,160,120);
  if(hands)hands.send({image:canvas});
  frameEl.textContent='✓ '+new Date().toLocaleTimeString();
  setTimeout(loop,150);
}
})();
</script>
</body>
</html>
